services:
  api:
    build: .
    container_name: payfake_api
    ports:
      - "8080:8080"
    environment:
      APP_NAME: payfake
      APP_ENV: development
      APP_PORT: 8080
      FRONTEND_URL: http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payfake
      DB_SSLMODE: disable
      JWT_SECRET: change-this-in-production
      JWT_EXPIRY_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: payfake_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payfake
    ports:
      - "5432:5432"
    volumes:
      # Named volume persists data across container restarts.
      # Without this every docker-compose down wipes the DB.
      - payfake_postgres_data:/var/lib/postgresql/data
    healthcheck:
      # depends_on with condition: service_healthy waits for this
      # check to pass before starting the API container. Without it
      # the API starts before Postgres is ready and the DB connection fails.
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  payfake_postgres_data:
